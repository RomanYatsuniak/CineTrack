name: workflow

on:
  workflow_dispatch:
  pull_request:
    types: 
      - opened
  push: 
    branches: 
      - main
      - 'dev-*'
    paths-ignore:
      - '.github/workflows/*'
env:
  MONGO_DB_NAME: gha-demo
jobs: 
  first-job:
    environment: testing
    env:
      TEST: cluster
      TEST_SECRET: ${{secrets.GITHUB_TOKEN}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Print
        run: echo "test"

      - name: Done
        run: echo "done"

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test $TEST 'MONGO ${{env.TEST}}'

  second-job:
    needs: first-job
    runs-on: ubuntu-latest
    steps:
      - name: test2
        run: echo "test2"
