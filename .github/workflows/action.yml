name: workflow

on:
  workflow_dispatch:
  pull_request:
    types: 
      - opened
  push: 
    branches: 
      - main
      - 'dev-*'
    paths-ignore:
      - '.github/workflows/*'
env:
  MONGO_DB_NAME: gha-demo  
jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:22
  deploy:
    uses: ./.github/workflows/reusable.yml
    with:
      artifact-name: dist-files
    secrets: 
      some-secret: ${{secrets.some-secret}}
  print-deploy-result:
    needs: deploy
    runs-on: ubuntu-latest
    services:
      mongodb: 
        image: mongo
        ports:
          - 27017:27017
        env:
          MONGO_INIT: root
          MONGO_PASS: example
    steps:
      - name: Print deploy output
        run: echo "${{needs.deploy.outputs.result}}"
  first-job:
    environment: testing
    env:
      TEST: cluster
      TEST_SECRET: ${{secrets.GITHUB_TOKEN}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Print
        run: echo "test"
      - name: Done
        run: echo "done"
      - name: Install Node
        id: install-node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        if: failure() && steps.install-node.outcome == 'failure'
        run: npm ci
      - name: Run tests
        continue-on-error: true
        run: npm test $TEST 'MONGO ${{env.TEST}}'
  second-job:
    needs: first-job
    runs-on: ubuntu-latest
    steps:
      - name: test2
        run: echo "test2"
  report:
    needs: [first-job, second-job]
    if: failure()
    runs-on: ubuntu-latest'
    steps:
    - name: output
      run: |
        echo "Something went wrong"
        echo "${{toJson(github)}}"
