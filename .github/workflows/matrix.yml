name: Matrix
on: push
jobs:
  build:
    continue-on-error: true
    strategy:
      matrix:
        node-version: [12,13,14]
    runs-on: ubuntu-latest
    steps:
      - name: GetCOde
        uses: actions/checkout@v3
      - name: Install node
        uses: actions/setup-node@v3
        with:
          node-version: ;${{matrix.node-version}}
      - name: install dependencies
        run: npm ci
      - name: build project
        run: npm run build
